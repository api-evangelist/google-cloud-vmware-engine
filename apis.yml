name: Google Cloud VMware Engine
description: >-
  Google Cloud VMware Engine is a fully managed service that lets you run VMware workloads natively on Google Cloud
  infrastructure. It provides dedicated, single-tenant VMware SDDC environments with vSphere, vSAN, NSX-T, and HCX,
  enabling seamless migration and management of VMware-based applications in the cloud.
